# @package _global_
# PPO training configuration

training:
  algorithm: "ppo"
  ppo:
    clip_range: 0.2
    kl_coef: 0.1
    kl_target: 0.1
    kl_adaptive: true
    value_lr: 5e-6
    policy_lr: 1e-5
    gamma: 0.99
    gae_lambda: 0.95
    vf_coef: 0.5
    entropy_coef: 0.01
    max_grad_norm: 1.0
    num_epochs_per_update: 4
    mini_batch_size: 2
